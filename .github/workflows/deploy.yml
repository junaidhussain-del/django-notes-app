name: Deploy to Production Servers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [SERVER_A_HOST, SERVER_B_HOST]
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.server] }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /Demo/django-notes-app
            git remote set-url origin https://github.com/junaidhussain-del/django-notes-app.git
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e data -e mysql -e .env
            if command -v docker-compose &> /dev/null && ! docker compose version &> /dev/null; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi
            $DC build django_app
            $DC up -d --no-deps django_app nginx
            docker image prune -f
